stages:
  - setup
  - test
  - report
  - deploy

variables:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"
  # Use double backslashes for Windows paths in variables
  ANDROID_HOME: "C:\\Users\\n.krotsik\\AppData\\Local\\Android\\Sdk"
  ALLURE_PATH: "C:\\Users\\n.krotsik\\Desktop\\EasyFin\\allure-2.36.0\\allure-2.36.0\\bin\\allure.bat"

install_deps:
  stage: setup
  tags:
    - mobile-runner
  script:
    - poetry install
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

mobile_tests:
  stage: test
  tags:
    - mobile-runner
  dependencies:
    - install_deps
  before_script:
    # 0. Clean up any hanging processes from previous failed runs
    - Stop-Process -Name "emulator-arm", "qemu-system-x86_64", "node" -ErrorAction SilentlyContinue
    - adb kill-server
    - adb start-server

    # 1. Start/Check Emulator
    - |
      $emulatorRunning = adb devices | Select-String -Pattern "\tdevice$"
      if (-not $emulatorRunning) {
        Write-Host "Starting headless emulator..."
        Start-Process "$env:ANDROID_HOME\emulator\emulator.exe" -ArgumentList "-avd Pixel_6_Pro_API_36_for_test_Easy-fin -no-window -no-audio -no-snapshot -selinux permissive" -NoNewWindow
        
        Write-Host "Waiting for Android to boot..."
        $booted = $false
        while (-not $booted) {
          $status = adb shell getprop sys.boot_completed
          if ($status -eq "1") { $booted = $true }
          else { Start-Sleep -s 5; Write-Host "Still booting..." }
        }
        Write-Host "Emulator is ready!"
      }

    # 2. Start Appium Server
    - Write-Host "Starting Appium..."
    - Start-Process cmd.exe -ArgumentList "/c appium" -NoNewWindow
    - Start-Sleep -s 15

  script:
    - if (-not (Test-Path allure-results)) { New-Item -ItemType Directory -Path allure-results }
    - $env:PYTHONPATH = "."
    - poetry run pytest tests/test_login_navigation.py --alluredir=allure-results

  after_script:
    - echo "Cleaning up the device..."
    - adb shell pm clear com.andersenlab.easyfin -ErrorAction SilentlyContinue
    - adb shell am force-stop com.andersenlab.easyfin -ErrorAction SilentlyContinue

  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 day

allure_report:
  stage: report
  tags:
    - mobile-runner
  dependencies:
    - mobile_tests
  when: always
  script:
    - if (-not (Test-Path allure-report)) { New-Item -ItemType Directory -Path allure-report }
    # Generate report using the absolute path variable
    - '& "$env:ALLURE_PATH" generate ./allure-results -o ./allure-report --clean'
  artifacts:
    paths:
      - allure-report/
    expire_in: 1 day

pages:
  stage: deploy
  tags:
    - mobile-runner
  dependencies:
    - allure_report
  script:
    - if (Test-Path public) { Remove-Item -Recurse -Force public }
    - New-Item -ItemType Directory -Path public
    # Using PowerShell Copy-Item for better reliability in CI
    - Copy-Item -Path "allure-report\*" -Destination "public\" -Recurse -Force
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH