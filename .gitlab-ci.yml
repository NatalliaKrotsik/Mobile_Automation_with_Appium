stages:
  - setup
  - test
  - report
  - deploy

variables:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

# ----------------------------
# Setup Stage
# ----------------------------
install_deps:
  stage: setup
  tags:
    - mobile-runner
  script:
    - poetry install --no-interaction --no-root
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour


# ----------------------------
# Android Test Stage
# ----------------------------
test_android:
  stage: test
  timeout: 20 minutes
  tags:
    - mobile-runner
  dependencies:
    - install_deps

  before_script:
    - |
      Write-Host "==============================="
      Write-Host "Checking emulator status..."
      Write-Host "==============================="

      $emulatorRunning = & "$env:ADB_EXE" devices | Select-String -Pattern "\tdevice$"

      if (-not $emulatorRunning) {
        Write-Host "Starting emulator: $env:DEVICE_NAME"
        Start-Process "$env:ANDROID_HOME\emulator\emulator.exe" `
          -ArgumentList "-avd $env:DEVICE_NAME -no-window -no-audio" `
          -PassThru | Out-Null

        & "$env:ADB_EXE" wait-for-device

        Write-Host "Waiting for Android OS boot..."
        $maxAttempts = 60
        for ($i=0; $i -lt $maxAttempts; $i++) {
          $boot = & "$env:ADB_EXE" shell getprop sys.boot_completed
          if ($boot.Trim() -eq "1") {
            Write-Host "Emulator boot completed!"
            break
          }
          Start-Sleep -Seconds 5
        }
      }
      else {
        Write-Host "Emulator already running."
      }

      Write-Host "==============================="
      Write-Host "Starting Appium server..."
      Write-Host "==============================="

      $appiumProcess = Start-Process appium -PassThru
      $global:AppiumPID = $appiumProcess.Id

      # Wait until Appium is ready
      $maxWait = 30
      $elapsed = 0
      while ($elapsed -lt $maxWait) {
        try {
          Invoke-WebRequest http://127.0.0.1:4723/status `
            -UseBasicParsing -TimeoutSec 2 | Out-Null
          Write-Host "Appium is ready!"
          break
        } catch {
          Start-Sleep -Seconds 2
          $elapsed += 2
        }
      }

  script:
    - $env:PYTHONPATH = "."
    - poetry run pytest tests/android/ --platform android

  after_script:
    - |
      Write-Host "==============================="
      Write-Host "Cleanup started..."
      Write-Host "==============================="

      # Stop Appium process safely
      if ($global:AppiumPID) {
        Write-Host "Stopping Appium (PID: $global:AppiumPID)"
        Stop-Process -Id $global:AppiumPID -Force -ErrorAction SilentlyContinue
      }

      # Force stop test app
      if (Test-Path $env:ADB_EXE) {
        & "$env:ADB_EXE" shell am force-stop com.andersenlab.easyfin 2>$null
        & "$env:ADB_EXE" kill-server 2>$null
      }

      Write-Host "Cleanup finished."

  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 day


# ----------------------------
# iOS Test Stage (Future Mac Runner)
# ----------------------------
test_ios:
  stage: test
  tags:
    - macos-runner
  script:
    - poetry run pytest tests/ios --platform ios
  allow_failure: true


# ----------------------------
# Allure Report Stage
# ----------------------------
allure_report:
  stage: report
  timeout: 5 minutes
  tags:
    - mobile-runner
  dependencies:
    - test_android
  when: always
  script:
    - |
      Write-Host "Generating Allure report..."
      & "$env:ALLURE_PATH" generate ./allure-results -o ./allure-report --clean
      Write-Host "Allure report generated."
  artifacts:
    paths:
      - allure-report/
    expire_in: 1 day


# ----------------------------
# Deploy to GitLab Pages
# ----------------------------
pages:
  stage: deploy
  timeout: 5 minutes
  tags:
    - mobile-runner
  dependencies:
    - allure_report
  script:
    - |
      Write-Host "Preparing GitLab Pages..."

      if (Test-Path public) {
        Remove-Item -Recurse -Force public
      }

      New-Item -ItemType Directory -Path public | Out-Null
      Copy-Item -Path "allure-report\*" -Destination "public\" -Recurse -Force

      Write-Host "Pages ready."
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
