stages:
  - setup
  - test
  - report
  - deploy

variables:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"
  ANDROID_HOME: "C:\\Users\\n.krotsik\\AppData\\Local\\Android\\Sdk"
  # Hardcoding the ADB path ensures we don't use the Desktop version by mistake
  ADB_EXE: "C:\\Users\\n.krotsik\\AppData\\Local\\Android\\Sdk\\platform-tools\\adb.exe"
  ALLURE_PATH: "C:\\Users\\n.krotsik\\Desktop\\EasyFin\\allure-2.36.0\\allure-2.36.0\\bin\\allure.bat"

install_deps:
  stage: setup
  tags:
    - mobile-runner
  script:
    - poetry install
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

mobile_tests:
  stage: test
  tags:
    - mobile-runner
  dependencies:
    - install_deps
  before_script:
    # 0. Safe cleanup: Check for running processes first to avoid exit code errors
    - |
      $procNames = "emulator-arm", "qemu-system-x86_64", "node"
      foreach ($name in $procNames) {
          $p = Get-Process -Name $name -ErrorAction SilentlyContinue
          if ($p) { 
              Write-Host "Stopping existing process: $name"
              $p | Stop-Process -Force 
          }
      }
    # Use the specific SDK ADB
    - "& '$env:ADB_EXE' kill-server"
    - "& '$env:ADB_EXE' start-server"

    # 1. Start/Check Emulator
    - |
      $emulatorRunning = & "$env:ADB_EXE" devices | Select-String -Pattern "\tdevice$"
      if (-not $emulatorRunning) {
        Write-Host "Starting headless emulator from SDK..."
        Start-Process "$env:ANDROID_HOME\emulator\emulator.exe" -ArgumentList "-avd Pixel_6_Pro_API_36_for_test_Easy-fin -no-window -no-audio -no-snapshot -read-only" -NoNewWindow
        
        Write-Host "Waiting for ADB to detect device..."
        & "$env:ADB_EXE" wait-for-device
        
        Write-Host "Waiting for Android OS boot..."
        $booted = $false
        $timer = 0
        while (-not $booted -and $timer -lt 40) {
          $status = & "$env:ADB_EXE" shell getprop sys.boot_completed
          if ($status.Trim() -eq "1") { 
            $booted = $true 
            Write-Host "Emulator is ready!"
          } else { 
            Start-Sleep -s 5
            $timer++
            Write-Host "Still booting (Attempt $timer)..." 
          }
        }
        if (-not $booted) { throw "Emulator failed to boot within timeout." }
      }

    # 2. Start Appium Server
    - Write-Host "Starting Appium..."
    - Start-Process cmd.exe -ArgumentList "/c appium" -NoNewWindow
    - Start-Sleep -s 15

  script:
    - if (-not (Test-Path allure-results)) { New-Item -ItemType Directory -Path allure-results }
    - $env:PYTHONPATH = "."
    # Ensure pytest uses the SDK path for its internal calls if needed
    - poetry run pytest tests/test_login_navigation.py --alluredir=allure-results

  after_script:
    - echo "Cleaning up the device..."
    - "& '$env:ADB_EXE' shell pm clear com.andersenlab.easyfin"
    - "& '$env:ADB_EXE' am force-stop com.andersenlab.easyfin"

  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 day

allure_report:
  stage: report
  tags:
    - mobile-runner
  dependencies:
    - mobile_tests
  when: always
  script:
    - if (-not (Test-Path allure-report)) { New-Item -ItemType Directory -Path allure-report }
    - '& "$env:ALLURE_PATH" generate ./allure-results -o ./allure-report --clean'
  artifacts:
    paths:
      - allure-report/
    expire_in: 1 day

pages:
  stage: deploy
  tags:
    - mobile-runner
  dependencies:
    - allure_report
  script:
    - if (Test-Path public) { Remove-Item -Recurse -Force public }
    - New-Item -ItemType Directory -Path public
    - Copy-Item -Path "allure-report\*" -Destination "public\" -Recurse -Force
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH