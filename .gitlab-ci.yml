stages:
  - setup
  - test
  - report
  - deploy

variables:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

install_deps:
  stage: setup
  tags:
    - mobile-runner
  script:
    - poetry install
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

mobile_tests:
  stage: test
  tags:
    - mobile-runner
  dependencies:
    - install_deps
  before_script:
    - |
      # 1. Start/Check Emulator
      $emulatorRunning = & "$env:ADB_EXE" devices | Select-String -Pattern "\tdevice$"
      
      if (-not $emulatorRunning) {
        Write-Host "Starting emulator: $env:DEVICE_NAME"
        Start-Process "$env:ANDROID_HOME\emulator\emulator.exe" `
          -ArgumentList "-avd $env:DEVICE_NAME -no-window -no-audio" `
          -NoNewWindow

        Write-Host "Waiting for ADB to detect device..."
        & "$env:ADB_EXE" wait-for-device

        Write-Host "Waiting for Android OS boot..."
        $booted = $false
        $timer = 0
        # Increased timeout slightly for reliability
        while (-not $booted -and $timer -lt 50) {
          $status = & "$env:ADB_EXE" shell getprop sys.boot_completed
          if ($status -and $status.Trim() -eq "1") {
            $booted = $true
            Write-Host "Emulator is ready!"
          } else {
            Start-Sleep -Seconds 5
            $timer++
            Write-Host "Still booting (Attempt $timer)..."
          }
        }
        if (-not $booted) { 
          Write-Warning "Emulator failed to boot within timeout. Continuing anyway..."
        }
      }

    # 2. Start Appium Server
    - Write-Host "Starting Appium..."
    - Start-Process cmd.exe -ArgumentList "/c appium" -NoNewWindow
    - Start-Sleep -Seconds 15

  script:
    - if (-not (Test-Path "allure-results")) { New-Item -ItemType Directory -Path "allure-results" }
    - $env:PYTHONPATH = "."
    - poetry run pytest --alluredir=allure-results

  after_script:
    - |
      Write-Host "Cleaning up background processes to release Runner..."
      # This is the 'secret sauce' to stop the job from hanging:
      Get-Process -Name "node" -ErrorAction SilentlyContinue | Stop-Process -Force
      Get-Process -Name "qemu-system-x86_64", "emulator" -ErrorAction SilentlyContinue | Stop-Process -Force
      
      if (Test-Path "$env:ADB_EXE") {
        & "$env:ADB_EXE" shell am force-stop com.andersenlab.easyfin
      }

  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 day

allure_report:
  stage: report
  tags:
    - mobile-runner
  dependencies:
    - mobile_tests
  when: always
  script:
    - |
      if (-not (Test-Path allure-report)) { New-Item -ItemType Directory -Path allure-report }
      & "$env:ALLURE_PATH" generate ./allure-results -o ./allure-report --clean
  artifacts:
    paths:
      - allure-report/
    expire_in: 1 day

pages:
  stage: deploy
  tags:
    - mobile-runner
  dependencies:
    - allure_report
  script:
    - if (Test-Path public) { Remove-Item -Recurse -Force public }
    - New-Item -ItemType Directory -Path public
    - Copy-Item -Path "allure-report\*" -Destination "public\" -Recurse -Force
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH