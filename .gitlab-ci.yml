stages:
  - setup
  - test
  - report
  - deploy

variables:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

# Optional: Separate setup to cache dependencies
install_deps:
  stage: setup
  tags:
    - mobile-runner
  script:
    - poetry install
  artifacts:
    paths:
      - .venv/

mobile_tests:
  stage: test
  tags:
    - mobile-runner
  before_script:
    # 1. Check if an emulator is already running
    - |
      $emulatorRunning = adb devices | Select-String -Pattern "\tdevice$"
      if (-not $emulatorRunning) {
        Write-Host "No emulator detected. Starting headless emulator..."
        # Replace 'Pixel_7_API_33' with your actual AVD name
        Start-Process "C:\Users\n.krotsik\AppData\Local\Android\Sdk\emulator\emulator.exe" -ArgumentList "-avd Pixel_6_Pro_API_36_for_test_Easy-fin -no-window -no-audio" -NoNewWindow
        Start-Sleep -s 30
      }
    # 2. Start Appium
    - Start-Process appium -NoNewWindow
    - Start-Sleep -s 10
  script:
    - if (Test-Path allure-results) { Remove-Item -Recurse -Force allure-results }
    # 1. Force create the folder to ensure it exists even if tests fail
    - if not exist allure-results mkdir allure-results
    # 2. Run your tests (use forward slashes for the alluredir path)
    - poetry run pytest --alluredir=allure-results
  artifacts:
    when: always
    paths:
        # Use the relative path from the project root
      - allure-results/
    expire_in: 1 day

  after_script:
    - echo "Cleaning up the device..."
    # Replace 'com.andersenlab.easyfin' with the name from 'adb shell dumpsys window | findstr mCurrentFocus'
    - adb shell pm clear com.andersenlab.easyfin
    - adb shell am force-stop com.andersenlab.easyfin

allure_report:
  stage: report
  tags:
    - mobile-runner
  when: always
  script:
    # 1. Force the creation of the output directory in the root
    - if not exist "allure-report" mkdir "allure-report"
    # 2. Use the EXACT path shown in your file tree for results
    # We use ./ to ensure we stay in the current build directory
    - '& "C:/Users/n.krotsik/Desktop/EasyFin/allure-2.36.0/allure-2.36.0/bin/allure.bat" generate ./allure-results -o ./allure-report --clean'
  artifacts:
    paths:
      - allure-report/
    expire_in: 1 day

pages:
  stage: deploy
  tags:
    - mobile-runner
  dependencies:
    - allure_report
  script:
    # Use PowerShell to ensure public is clean and fresh
    - if (Test-Path public) { Remove-Item -Recurse -Force public }
    - New-Item -ItemType Directory -Path public
    # Copy using the dot slash to be explicit for Windows
    - xcopy /s /e /y "allure-report\*" "public\"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH