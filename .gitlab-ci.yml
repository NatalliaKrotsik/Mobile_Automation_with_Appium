stages:
  - setup
  - test
  - report

variables:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

# Optional: Separate setup to cache dependencies
install_deps:
  stage: setup
  tags:
    - mobile-runner
  script:
    - poetry install
  artifacts:
    paths:
      - .venv/

mobile_tests:
  stage: test
  tags:
    - mobile-runner
  before_script:
    # Use 'Start-Process' for a cleaner background start on Windows PowerShell
    - Start-Process appium -NoNewWindow
    - Start-Sleep -s 10
  script:
    # 1. Force create the folder to ensure it exists even if tests fail
    - if not exist report\allure-results mkdir report\allure-results
    # 2. Run your tests (use forward slashes for the alluredir path)
    - poetry run pytest --alluredir=report/allure-results
  artifacts:
    when: always
    paths:
        # Use the relative path from the project root
      - report/allure-results/
  after_script:
    - echo "Cleaning up the device..."
    # Replace 'com.andersenlab.easyfin' with the name from 'adb shell dumpsys window | findstr mCurrentFocus'
    - adb shell pm clear com.andersenlab.easyfin
    - adb shell am force-stop com.andersenlab.easyfin

allure_report:
  stage: report
  tags:
    - mobile-runner
  when: always
  script:
    # Fix: Point to the correct path generated in the previous step
    - allure generate report/allure-results -o report/allure-report --clean
  artifacts:
    paths:
      - report/allure-report