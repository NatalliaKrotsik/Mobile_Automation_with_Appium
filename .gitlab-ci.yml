stages:
  - setup
  - test
  - report
  - deploy

variables:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

install_deps_android:
  stage: setup
  tags:
    - android-runner
  script:
    - poetry install
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

test_android:
  stage: test
  timeout: 15 minutes
  tags:
    - android-runner
  dependencies:
    - install_deps_android
  before_script:
    - |
      # 1. Start/Check Emulator
      $emulatorRunning = & "$env:ADB_EXE" devices | Select-String -Pattern "\tdevice$"
      
      if (-not $emulatorRunning) {
        Write-Host "Starting emulator: $env:DEVICE_NAME"
        Start-Process "$env:ANDROID_HOME\emulator\emulator.exe" -ArgumentList "-avd $env:DEVICE_NAME -no-window -no-audio" -NoNewWindow

        Write-Host "Waiting for ADB to detect device..."
        & "$env:ADB_EXE" wait-for-device

        Write-Host "Waiting for Android OS boot..."
        $booted = $false
        $timer = 0
        while (-not $booted -and $timer -lt 50) {
          $status = & "$env:ADB_EXE" shell getprop sys.boot_completed
          if ($status -and $status.Trim() -eq "1") {
            $booted = $true
            Write-Host "Emulator is ready!"
          } else {
            Start-Sleep -Seconds 5
            $timer++
            Write-Host "Still booting (Attempt $timer)..."
          }
        }
        if (-not $booted) { 
          Write-Warning "Emulator failed to boot within timeout. Continuing anyway..."
        }
      } else {
        Write-Host "Emulator already running, skipping startup."
      }
      
      # 2. Start Appium Server
      Write-Host "Starting Appium server..."
      $global:appiumJob = Start-Job -ScriptBlock { appium }
      $maxWait = 30
      $elapsed = 0
      while ($elapsed -lt $maxWait) {
          try {
        Invoke-WebRequest http://localhost:4723/status -UseBasicParsing -TimeoutSec 2 | Out-Null
        Write-Host "Appium is ready!"
        break
          } catch {
        Start-Sleep -Seconds 2
        $elapsed += 2
          }
        }

  script:
    - if (-not (Test-Path "allure-results")) { New-Item -ItemType Directory -Path "allure-results" }
    - $env:PYTHONPATH = "."
    - poetry run pytest tests/android/

  after_script:
    - |
      Write-Host "======================================"
      Write-Host "Starting cleanup process..."
      Write-Host "======================================"
      
      # 1. Stop all PowerShell background jobs (Appium)
      Write-Host "Stopping background jobs..."
      Get-Job | ForEach-Object {
        Write-Host "Stopping job: $($_.Name) (ID: $($_.Id))"
        Stop-Job -Id $_.Id -ErrorAction SilentlyContinue
        Remove-Job -Id $_.Id -Force -ErrorAction SilentlyContinue
      }
      
      # 2. Kill all Node processes (Appium server)
      Write-Host "Killing Node.js processes (Appium)..."
      $nodeProcesses = Get-Process -Name "node" -ErrorAction SilentlyContinue
      if ($nodeProcesses) {
        $nodeProcesses | ForEach-Object {
          Write-Host "Killing Node process: PID $($_.Id)"
          Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
        }
        Write-Host "All Node processes terminated."
      } else {
        Write-Host "No Node processes found."
      }
      
      # 3. Force stop the test app
      Write-Host "Force stopping app: com.andersenlab.easyfin"
      if (Test-Path $env:ADB_EXE) {
        & "$env:ADB_EXE" shell am force-stop com.andersenlab.easyfin 2>$null
      }
      
      # 4. Kill ADB server for clean state
      Write-Host "Stopping ADB server..."
      if (Test-Path $env:ADB_EXE) {
        & "$env:ADB_EXE" kill-server 2>$null
      }
      
      # 5. Optional: Kill emulator (uncomment if you want fresh emulator each run)
      # Write-Host "Stopping emulator..."
      # Get-Process -Name "qemu-system-x86_64", "emulator" -ErrorAction SilentlyContinue | Stop-Process -Force
      
      Write-Host "======================================"
      Write-Host "Cleanup completed successfully!"
      Write-Host "======================================"

  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 day

#test_ios:
# stage: test
#  tags:
#   - macos-runner   # A future Mac Runner
#  script:
#   - poetry run pytest tests/ios
# allow_failure: true # Keeps your pipeline green even if this fails

allure_report:
  stage: report
  timeout: 5 minutes
  tags:
    - android-runner
  dependencies:
    - test_android
  when: always
  script:
    - |
      Write-Host "Generating Allure report..."
      if (-not (Test-Path allure-report)) { New-Item -ItemType Directory -Path allure-report }
      & "$env:ALLURE_PATH" generate ./allure-results -o ./allure-report --clean
      Write-Host "Allure report generated successfully."
  artifacts:
    paths:
      - allure-report/
    expire_in: 1 day

pages:
  stage: deploy
  timeout: 5 minutes
  tags:
    - android-runner
  dependencies:
    - allure_report
  script:
    - |
      Write-Host "Preparing pages for deployment..."
      if (Test-Path public) { 
        Remove-Item -Recurse -Force public 
        Write-Host "Removed existing public directory."
      }
      New-Item -ItemType Directory -Path public
      Copy-Item -Path "allure-report\*" -Destination "public\" -Recurse -Force
      Write-Host "Pages prepared successfully."
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH