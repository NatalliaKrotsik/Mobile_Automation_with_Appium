stages:
  - setup
  - test
  - report
  - deploy

variables:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

# Optional: Separate setup to cache dependencies
install_deps:
  stage: setup
  tags:
    - mobile-runner
  script:
    - poetry install
  artifacts:
    paths:
      - .venv/

mobile_tests:
  stage: test
  tags:
    - mobile-runner
  before_script:
    # Use 'Start-Process' for a cleaner background start on Windows PowerShell
    - Start-Process appium -NoNewWindow
    - Start-Sleep -s 10
  script:
    # 1. Force create the folder to ensure it exists even if tests fail
    - if not exist report\allure-results mkdir report\allure-results
    # 2. Run your tests (use forward slashes for the alluredir path)
    - poetry run pytest --alluredir=report/allure-results
  artifacts:
    when: always
    paths:
        # Use the relative path from the project root
      - report/allure-results/
  after_script:
    - echo "Cleaning up the device..."
    # Replace 'com.andersenlab.easyfin' with the name from 'adb shell dumpsys window | findstr mCurrentFocus'
    - adb shell pm clear com.andersenlab.easyfin
    - adb shell am force-stop com.andersenlab.easyfin

allure_report:
  stage: report
  tags:
    - mobile-runner
  when: always
  script:
    - '"C:/Users/n.krotsik/Desktop/EasyFin/allure-2.36.0/allure-2.36.0/bin/allure.bat" generate report/allure-results -o allure-report --clean'
  artifacts:
    paths:
      - report/allure-report/
    expire_in: 1 day

pages:
  stage: deploy
  tags:
    - mobile-runner
  # This links the jobs so 'allure-report' is downloaded here
  dependencies:
    - allure_report
  script:
    # 1. Cleanly handle the 'public' folder in PowerShell
    - if (Test-Path public) { Remove-Item -Recurse -Force public }
    - New-Item -ItemType Directory -Path public
    # 2. Copy the files
    - xcopy /s /e /y allure-report\* public\
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH