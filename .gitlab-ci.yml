stages:
  - setup
  - test
  - report
  - deploy

variables:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

install_deps:
  stage: setup
  tags:
    - mobile-runner
  script:
    - poetry install
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

mobile_tests:
  stage: test
  tags:
    - mobile-runner

  before_script:
    # Load environment variables from .env
    - .\load_env.ps1

    # Debug print to verify variables
    - Write-Host "ADB_EXE = '$env:ADB_EXE'"
    - Write-Host "ANDROID_HOME = '$env:ANDROID_HOME'"
    - Write-Host "ANDROID_SDK_ROOT = '$env:ANDROID_SDK_ROOT'"
    - Write-Host "ALLURE_PATH = '$env:ALLURE_PATH'"

    # Check if paths exist
    - if (-not (Test-Path "$env:ADB_EXE")) { throw "ADB_EXE not found at $env:ADB_EXE" }
    - if (-not (Test-Path "$env:ANDROID_HOME\emulator\emulator.exe")) { throw "Emulator not found at $env:ANDROID_HOME\emulator\emulator.exe" }

    # 1. Start/Check Emulator
    - |
      $emulatorRunning = & "$env:ADB_EXE" devices | Select-String -Pattern "\tdevice$"
      if (-not $emulatorRunning) {
        Write-Host "Starting headless emulator from SDK..."
        Start-Process "$env:ANDROID_HOME\emulator\emulator.exe" `
          -ArgumentList "-avd Pixel_6_Pro_API_36_for_test_Easy-fin -no-window -no-audio -no-snapshot -read-only" `
          -NoNewWindow

        Write-Host "Waiting for ADB to detect device..."
        & "$env:ADB_EXE" wait-for-device

        Write-Host "Waiting for Android OS boot..."
        $booted = $false
        $timer = 0
        while (-not $booted -and $timer -lt 40) {
          $status = & "$env:ADB_EXE" shell getprop sys.boot_completed
          if ($status -and $status.Trim() -eq "1") {
            $booted = $true
            Write-Host "Emulator is ready!"
          } else {
            Start-Sleep -Seconds 5
            $timer++
            Write-Host "Still booting (Attempt $timer)..."
          }
        }

        if (-not $booted) { Write-Warning "Emulator failed to boot within timeout. Continuing anyway..." }
      }

    # 2. Start Appium Server
    - Write-Host "Starting Appium..."
    - Start-Process cmd.exe -ArgumentList "/c appium" -NoNewWindow
    - Start-Sleep -Seconds 15

  script:
    # Ensure results directory exists before tests
    - if (-not (Test-Path "allure-results")) { New-Item -ItemType Directory -Path "allure-results" }
    - $env:PYTHONPATH = "."
    - poetry run pytest

  after_script:
    - Write-Host "Cleaning up the device..."
    - |
      try {
        if (Test-Path "$env:ADB_EXE") {
          & "$env:ADB_EXE" shell pm clear com.andersenlab.easyfin
          & "$env:ADB_EXE" shell am force-stop com.andersenlab.easyfin
        }
      } catch {
        Write-Warning "Device cleanup failed, but continuing..."
      }

  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 day

allure_report:
  stage: report
  tags:
    - mobile-runner
  dependencies:
    - mobile_tests
  when: always
  script:
    - |
      if (-not (Test-Path allure-report)) { New-Item -ItemType Directory -Path allure-report }
      & "$env:ALLURE_PATH" generate ./allure-results -o ./allure-report --clean
  artifacts:
    paths:
      - allure-report/
    expire_in: 1 day

pages:
  stage: deploy
  tags:
    - mobile-runner
  dependencies:
    - allure_report
  script:
    - if (Test-Path public) { Remove-Item -Recurse -Force public }
    - New-Item -ItemType Directory -Path public
    - Copy-Item -Path "allure-report\*" -Destination "public\" -Recurse -Force
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
